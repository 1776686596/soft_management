name: release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential pkg-config libgtk-4-dev libadwaita-1-dev

      - name: Setup Rust (rust-toolchain.toml)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.85

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Build
        run: |
          cargo build --release

      - name: Package
        run: |
          bash scripts/package-linux.sh "${GITHUB_REF_NAME}" dist
          bash scripts/package-deb.sh "${GITHUB_REF_NAME}" dist

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.tar.gz.sha256
            dist/*.deb
            dist/*.deb.sha256
